name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start Coolify containers
        run: bun run test:integration:setup

      - name: Run integration tests
        run: bun run test:integration:run

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs --tail=200

      - name: Teardown containers
        if: always()
        run: bun run test:integration:teardown
